<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Sizzler — Offline</title>
    <style>
      :root { color-scheme: light; }
      body {
        margin: 0; min-height: 100dvh;
        display: grid; place-content: center; text-align: center;
        gap: 18px; padding: 24px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #fbf5ec; color: #2a2118;
      }
      .flame { font-size: 64px; animation: bob 1.6s ease-in-out infinite; }
      h1 { margin: 0; font-size: 22px; letter-spacing: -0.02em; }
      p { margin: 0; color: #7a6f63; max-width: 28ch; }
      @keyframes bob { 50% { transform: translateY(-8px) rotate(-3deg); } }
    </style>
  </head>
  <body>
    <div class="flame">🔥</div>
    <h1>You're offline</h1>
    <p>Your saved recipes are still here. New imports and planning will sync once you're back online.</p>
  </body>
</html>
