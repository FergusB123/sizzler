<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icons/icon-192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#FBF5EC" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Sizzler" />

    <title>Sizzler — Plan · Cook · Enjoy</title>

  <body>
    <div id="root">
      <!-- First-paint splash: the signature "warming up your kitchen" loader -->
      <div id="boot-splash">
        <div class="sizzle-load">
          <span class="sizzle-ring"></span>
          <span class="sizzle-ring delay"></span>
          <img class="sizzle-mark" src="/brand/sizzler-mark-ondark.png" alt="Sizzler" />
        </div>
        <div style="display:flex;flex-direction:column;align-items:center;">
          <div class="sizzle-dots"><span></span><span></span><span></span></div>
          <span class="sizzle-cap">Warming up your kitchen…</span>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
